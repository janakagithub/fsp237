<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FSP237 model browser</title>
<link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css">
<style>
  :root { --border:#d0d7de; --muted:#57606a; --bg:#f6f8fa; --accent:#0969da; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
         margin: 0; padding: 0; color: #1f2328; }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: white;
           position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0 0 4px 0; font-size: 18px; }
  header .meta { font-size: 12px; color: var(--muted); }
  .tabs { display: flex; gap: 4px; padding: 0 20px; background: white;
          border-bottom: 1px solid var(--border); }
  .tab-btn { background: none; border: none; padding: 10px 16px; cursor: pointer;
             font-size: 14px; color: var(--muted); border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-btn:hover:not(.active) { color: #1f2328; }
  .panel { display: none; padding: 16px 20px; }
  .panel.active { display: block; }
  #panel-map { padding: 0; height: calc(100vh - 100px); }
  #panel-map iframe { width: 100%; height: 100%; border: none; }
  table.dataTable { font-size: 12px; }
  table.dataTable td { vertical-align: top; }
  table.dataTable thead th { background: var(--bg); white-space: nowrap; }
  table.dataTable tfoot th { padding: 4px; }
  table.dataTable tfoot input { width: 100%; padding: 4px 6px; font-size: 11px;
                                 border: 1px solid var(--border); border-radius: 3px; }
  .nowrap { white-space: nowrap; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  .flux-pos { color: #1a7f37; }
  .flux-neg { color: #cf222e; }
  .flux-zero { color: var(--muted); }
  .loading { padding: 40px; text-align: center; color: var(--muted); }
  .equation { max-width: 380px; word-break: break-word; }
</style>
</head>
<body>
<header>
  <h1>FSP237 (<i>C. sublineola</i>) &mdash; minimal glucose model</h1>
  <div class="meta" id="meta">Loading&hellip;</div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="reactions">Reactions</button>
  <button class="tab-btn" data-tab="fluxes">Active fluxes</button>
  <button class="tab-btn" data-tab="map">Escher map</button>
</div>

<div id="panel-reactions" class="panel active">
  <div class="loading" id="loading-reactions">Loading reaction data&hellip;</div>
  <table id="tbl-reactions" style="display:none; width:100%">
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Comp.</th><th>Dir.</th>
        <th>Equation (cpd)</th><th>Equation (name)</th>
        <th>EC</th><th>GPR</th><th>Pathway</th>
        <th>LB</th><th>UB</th>
      </tr>
    </thead>
    <tfoot>
      <tr>
        <th></th><th></th><th></th><th></th><th></th><th></th>
        <th></th><th></th><th></th><th></th><th></th>
      </tr>
    </tfoot>
  </table>
</div>

<div id="panel-fluxes" class="panel">
  <div class="loading" id="loading-fluxes">Loading flux data&hellip;</div>
  <table id="tbl-fluxes" style="display:none; width:100%">
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Comp.</th><th>Dir.</th>
        <th>Equation (cpd)</th><th>Equation (name)</th>
        <th>EC</th><th>GPR</th><th>Pathway</th>
        <th>Flux</th>
      </tr>
    </thead>
    <tfoot>
      <tr>
        <th></th><th></th><th></th><th></th><th></th><th></th>
        <th></th><th></th><th></th><th></th>
      </tr>
    </tfoot>
  </table>
</div>

<div id="panel-map" class="panel">
  <iframe src="map.html" title="Escher flux map"></iframe>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
<script>
(function() {
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = {
    reactions: document.getElementById('panel-reactions'),
    fluxes:    document.getElementById('panel-fluxes'),
    map:       document.getElementById('panel-map'),
  };
  let fluxesInitialized = false;

  tabs.forEach(btn => btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.toggle('active', b === btn));
    Object.entries(panels).forEach(([k, el]) =>
      el.classList.toggle('active', k === btn.dataset.tab));
    if (btn.dataset.tab === 'fluxes' && !fluxesInitialized && window._reactionData) {
      initFluxesTable(window._reactionData);
      fluxesInitialized = true;
    }
    if (btn.dataset.tab === 'reactions' && window._reactionsDT)
      window._reactionsDT.columns.adjust();
    if (btn.dataset.tab === 'fluxes' && window._fluxesDT)
      window._fluxesDT.columns.adjust();
  }));

  function fmtFlux(f) {
    if (f == null) return '<span class="flux-zero">&mdash;</span>';
    if (Math.abs(f) < 1e-9) return '<span class="flux-zero">0</span>';
    const cls = f > 0 ? 'flux-pos' : 'flux-neg';
    const abs = Math.abs(f);
    const txt = (abs >= 0.01 && abs < 1e6) ? f.toFixed(4) : f.toExponential(3);
    return '<span class="' + cls + ' mono">' + txt + '</span>';
  }
  function fmtComp(c, name) {
    if (!c) return '';
    return '<span title="' + (name || '') + '" class="mono">' + c + '</span>';
  }
  function esc(s) { return $('<div>').text(s == null ? '' : s).html(); }

  function wireFooterSearch(dt) {
    dt.columns().every(function () {
      const col = this;
      const title = $(col.header()).text().trim();
      const input = $('<input type="search" placeholder="Filter…">')
        .appendTo($(col.footer()).empty())
        .on('keyup change clear', function () {
          if (col.search() !== this.value) col.search(this.value).draw();
        });
      input.attr('aria-label', 'Filter ' + title);
    });
  }

  function initReactionsTable(rows) {
    const data = rows.map(r => [
      '<span class="mono">' + esc(r.id) + '</span>',
      esc(r.name),
      fmtComp(r.compartment, r.compartment_name),
      '<span class="mono nowrap">' + esc(r.direction) + '</span>',
      '<span class="mono equation">' + esc(r.equation_cpd) + '</span>',
      '<span class="equation">' + esc(r.equation_name) + '</span>',
      '<span class="mono">' + esc(r.ec) + '</span>',
      '<span class="mono">' + esc(r.gpr) + '</span>',
      esc(r.subsystem),
      '<span class="mono">' + esc(r.lb) + '</span>',
      '<span class="mono">' + esc(r.ub) + '</span>',
    ]);
    $('#loading-reactions').hide();
    $('#tbl-reactions').show();
    const dt = new DataTable('#tbl-reactions', {
      data: data,
      pageLength: 50,
      lengthMenu: [25, 50, 100, 250, 500],
      order: [[0, 'asc']],
      deferRender: true,
      autoWidth: false,
    });
    wireFooterSearch(dt);
    window._reactionsDT = dt;
  }

  function initFluxesTable(rows) {
    const active = rows.filter(r => r.flux != null && Math.abs(r.flux) > 1e-9);
    const data = active.map(r => [
      '<span class="mono">' + esc(r.id) + '</span>',
      esc(r.name),
      fmtComp(r.compartment, r.compartment_name),
      '<span class="mono nowrap">' + esc(r.direction) + '</span>',
      '<span class="mono equation">' + esc(r.equation_cpd) + '</span>',
      '<span class="equation">' + esc(r.equation_name) + '</span>',
      '<span class="mono">' + esc(r.ec) + '</span>',
      '<span class="mono">' + esc(r.gpr) + '</span>',
      esc(r.subsystem),
      fmtFlux(r.flux),
    ]);
    $('#loading-fluxes').hide();
    $('#tbl-fluxes').show();
    const dt = new DataTable('#tbl-fluxes', {
      data: data,
      pageLength: 50,
      lengthMenu: [25, 50, 100, 250, 500],
      order: [[9, 'desc']],
      deferRender: true,
      autoWidth: false,
      columnDefs: [{
        targets: 9,
        type: 'num',
        render: function(d, type) {
          if (type === 'sort' || type === 'type') {
            const m = /(-?\d+(?:\.\d+)?(?:[eE][-+]?\d+)?)/.exec(d);
            return m ? parseFloat(m[1]) : 0;
          }
          return d;
        }
      }],
    });
    wireFooterSearch(dt);
    window._fluxesDT = dt;
  }

  fetch('reactions.json?v=' + Date.now())
    .then(r => r.json())
    .then(d => {
      window._reactionData = d.reactions;
      const meta = d.n_reactions.toLocaleString() + ' reactions · ' +
                   d.n_active.toLocaleString() + ' carrying flux · ' +
                   'generated ' + d.generated_at;
      document.getElementById('meta').textContent = meta;
      initReactionsTable(d.reactions);
    })
    .catch(err => {
      document.getElementById('loading-reactions').textContent =
        'Failed to load reactions.json: ' + err.message;
    });
})();
</script>
</body>
</html>
